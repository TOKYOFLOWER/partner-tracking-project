<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銀座東京フラワー - 商品一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#fdf2f2', 100: '#fce4e4', 200: '#f9c5c5', 400: '#d4292c', 500: '#a50407', 600: '#8a0306', 700: '#6e0205' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
    [x-cloak] { display: none !important; }
    .img-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: #fdf2f2; color: #f9c5c5; font-size: 3rem;
    }
  </style>
</head>
<body class="bg-white text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-lg font-bold text-primary-700 tracking-wide">銀座東京フラワー</a>
      <a href="cart.html" class="relative inline-flex items-center text-gray-600 hover:text-primary-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121 0 2.09-.773 2.34-1.865l1.846-8.078A.75.75 0 0 0 22.106 3.5H6.372m1.128 10.75L6.106 5.272" />
        </svg>
        <span x-data="{ count: 0 }" x-init="
          count = Cart.getCartCount();
          window.addEventListener('cart-updated', () => { count = Cart.getCartCount(); });
        " x-show="count > 0" x-text="count"
          class="absolute -top-1.5 -right-2.5 bg-primary-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"></span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6" x-data="productList()" x-init="init()">

    <!-- Category Tabs -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-1">
      <template x-for="cat in categories" :key="cat.value">
        <button
          @click="activeCategory = cat.value"
          :class="activeCategory === cat.value
            ? 'bg-primary-600 text-white'
            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
          class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition"
          x-text="cat.label"></button>
      </template>
    </div>

    <!-- ローディングスケルトン -->
    <template x-if="loading">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        <template x-for="i in 6" :key="i">
          <div class="bg-white rounded-xl shadow-sm overflow-hidden animate-pulse">
            <div class="bg-gray-200 aspect-[4/3] w-full"></div>
            <div class="p-4">
              <div class="bg-gray-200 h-5 w-3/4 rounded mb-2"></div>
              <div class="bg-gray-200 h-4 w-full rounded mb-3"></div>
              <div class="flex justify-between items-center">
                <div class="bg-gray-200 h-6 w-24 rounded"></div>
                <div class="bg-gray-200 h-10 w-28 rounded-lg"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Error -->
    <div x-show="error" class="text-center py-20 text-red-500" x-text="error"></div>

    <!-- Product Grid -->
    <div x-show="!loading && !error" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <template x-for="p in filteredProducts" :key="p.product_id">
        <div class="border border-gray-100 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition bg-white flex flex-col">
          <!-- Image -->
          <a :href="'product.html?id=' + p.product_id" class="block">
            <div class="aspect-[4/3] relative bg-primary-50 overflow-hidden">
              <img :src="(p.images && p.images.trim()) ? p.images.split(/[\n\r]+/)[0].trim() : p.image" :alt="p.name"
                class="w-full h-full object-cover"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div class="img-placeholder absolute inset-0" style="display:none;">&#x1F33F;</div>
              <div x-show="!p.in_stock"
                class="absolute inset-0 bg-black/40 flex items-center justify-center">
                <span class="bg-white text-gray-700 font-bold text-sm px-4 py-1.5 rounded">SOLD OUT</span>
              </div>
            </div>
          </a>
          <!-- Info -->
          <div class="p-4 flex flex-col flex-1">
            <a :href="'product.html?id=' + p.product_id" class="hover:text-primary-600 transition">
              <h3 class="font-bold text-base mb-1" x-text="p.name"></h3>
            </a>
            <p class="text-gray-500 text-sm truncate mb-3" x-text="p.description"></p>
            <div class="mt-auto flex items-center justify-between">
              <span class="text-lg font-bold text-primary-700">
                <span x-text="'¥' + (p._hasVariants ? p._minPrice.toLocaleString() : Number(p.price).toLocaleString())"></span><span x-show="p._hasVariants" class="text-sm font-normal">〜</span>
              </span>
              <button
                x-show="p.in_stock"
                @click="addToCart(p.product_id)"
                class="bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition active:scale-95">
                カートに入れる
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Toast -->
    <div x-show="toast" x-transition.opacity.duration.300ms
      class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-lg shadow-lg text-sm z-50"
      x-text="toastMessage"></div>

    <!-- Variant Modal -->
    <div x-show="showModal" x-cloak
      class="fixed inset-0 z-50 flex items-end sm:items-center justify-center"
      @keydown.escape.window="showModal = false">
      <div class="absolute inset-0 bg-black/40" @click="showModal = false"></div>
      <div class="relative bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto shadow-2xl"
           x-show="showModal"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="translate-y-full sm:translate-y-0 sm:opacity-0 sm:scale-95"
           x-transition:enter-end="translate-y-0 sm:scale-100 sm:opacity-100"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="translate-y-0 sm:scale-100 sm:opacity-100"
           x-transition:leave-end="translate-y-full sm:translate-y-0 sm:opacity-0 sm:scale-95">
        <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-3 flex items-center justify-between z-10">
          <h3 class="font-bold text-base" x-text="modalProduct ? modalProduct.name : ''"></h3>
          <button @click="showModal = false" class="text-gray-400 hover:text-gray-600 transition">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-5 py-4">
          <div class="flex gap-4 mb-4">
            <img :src="modalThumb" class="w-24 h-24 object-cover rounded-lg bg-gray-50" onerror="this.style.display='none'">
            <div>
              <p class="text-lg font-bold text-primary-700" x-text="'¥' + modalDisplayPrice().toLocaleString()"></p>
              <p class="text-xs text-gray-400">（税込）</p>
            </div>
          </div>
          <div class="space-y-4">
            <template x-for="opt in modalVariants.options" :key="opt.name">
              <div>
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm font-bold text-gray-700" x-text="opt.name"></span>
                  <span class="text-xs text-primary-600" x-text="modalSelected[opt.name] || ''"></span>
                </div>
                <div class="flex flex-wrap gap-2">
                  <template x-for="val in opt.values" :key="val">
                    <button @click="modalSelected[opt.name] = val; updateModalVariant()"
                      :class="modalSelected[opt.name] === val
                        ? 'border-primary-600 bg-primary-50 text-primary-700 ring-1 ring-primary-600'
                        : 'border-gray-200 bg-white text-gray-700 hover:border-gray-400'"
                      class="px-3 py-2 border rounded-lg text-sm font-medium transition cursor-pointer"
                      x-text="val"></button>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <div x-show="modalCurrentVariant && !modalCurrentVariant.in_stock"
            class="mt-3 p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
            この組み合わせは現在売り切れです
          </div>
        </div>
        <div class="sticky bottom-0 bg-white border-t border-gray-100 px-5 py-3">
          <button @click="addToCartFromModal()"
            :disabled="modalCurrentVariant && !modalCurrentVariant.in_stock"
            :class="(modalCurrentVariant && !modalCurrentVariant.in_stock) ? 'bg-gray-400 cursor-not-allowed' : 'bg-primary-600 hover:bg-primary-700 active:scale-[0.98]'"
            class="w-full text-white font-bold py-3 rounded-lg transition text-base">
            カートに入れる
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-50">
    &copy; 2026 銀座東京フラワー
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/partner.js"></script>
  <script src="js/cart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function productList() {
      return {
        products: [],
        loading: true,
        error: null,
        activeCategory: 'all',
        toast: false,
        toastMessage: '',
        // Modal
        showModal: false,
        modalProduct: null,
        modalThumb: '',
        modalVariants: { options: [], combinations: [] },
        modalSelected: {},
        modalCurrentVariant: null,
        categories: [
          { value: 'all', label: 'すべて' }
        ],
        get filteredProducts() {
          if (this.activeCategory === 'all') return this.products;
          return this.products.filter(p => p.category === this.activeCategory);
        },
        categoryLabels: {
          'mothers_day': '母の日ギフト',
          'arrangement': 'アレンジメント',
          'bouquet': '花束',
          'plant': '観葉植物',
          'orchid': '胡蝶蘭',
          'stand': 'スタンド花',
          'preserved': 'プリザーブドフラワー'
        },
        async init() {
          Partner.initPartnerTracking();

          // キャッシュから即座に表示
          var cached = getCachedProducts();
          if (cached) {
            this.products = cached;
            this.loading = false;
            this.buildCategories();
          }

          // APIから最新データを取得
          try {
            var freshProducts = await API.fetchProducts();
            if (freshProducts && Array.isArray(freshProducts)) {
              this.products = freshProducts;
              this.buildCategories();
              setCachedProducts(freshProducts);
              await this.loadVariantPrices();
            }
          } catch (e) {
            if (!cached) {
              this.error = '商品情報の読み込みに失敗しました';
            }
          } finally {
            this.loading = false;
          }
        },
        buildCategories() {
          var catMap = {};
          for (var ci = 0; ci < this.products.length; ci++) {
            var cat = this.products[ci].category;
            if (cat && cat !== '') {
              var so = Number(this.products[ci].sort_order) || 9999;
              if (!catMap[cat] || so < catMap[cat]) {
                catMap[cat] = so;
              }
            }
          }
          var self = this;
          var catEntries = Object.keys(catMap).map(function(c) {
            return { value: c, label: self.categoryLabels[c] || c, sortOrder: catMap[c] };
          });
          catEntries.sort(function(a, b) { return a.sortOrder - b.sortOrder; });
          this.categories = [{ value: 'all', label: 'すべて' }].concat(catEntries);
        },
        async loadVariantPrices() {
          for (var i = 0; i < this.products.length; i++) {
            var p = this.products[i];
            try {
              var variants = await API.fetchVariants(p.product_id);
              if (variants.options && variants.options.length > 0 && variants.combinations && variants.combinations.length > 0) {
                var basePrice = Number(p.price) || 0;
                var prices = variants.combinations.map(function(c) {
                  return (c.price !== null && c.price !== undefined) ? c.price : basePrice;
                });
                p._minPrice = Math.min.apply(null, prices);
                p._maxPrice = Math.max.apply(null, prices);
                p._hasVariants = true;
              }
            } catch (e) {}
          }
        },
        async addToCart(productId) {
          try {
            var variants = await API.fetchVariants(productId);
            if (variants.options && variants.options.length > 0) {
              this.modalProduct = this.products.find(function(p) { return p.product_id === productId; });
              this.modalVariants = variants;
              var p = this.modalProduct;
              this.modalThumb = (p.images && String(p.images).trim()) ? String(p.images).split(/[\n\r]+/)[0].trim() : (p.image || '');
              var self = this;
              this.modalSelected = {};
              variants.options.forEach(function(opt) {
                self.modalSelected[opt.name] = opt.values[0];
              });
              this.updateModalVariant();
              this.showModal = true;
              return;
            }
          } catch (e) {}
          Cart.addToCart(productId, 1);
          window.dispatchEvent(new CustomEvent('cart-updated'));
          this.showToast('カートに追加しました');
        },

        updateModalVariant() {
          if (!this.modalVariants.combinations) return;
          var self = this;
          this.modalCurrentVariant = this.modalVariants.combinations.find(function(c) {
            return Object.keys(self.modalSelected).every(function(key) {
              return c.selections[key] === self.modalSelected[key];
            });
          }) || null;
        },

        modalDisplayPrice() {
          if (this.modalCurrentVariant && this.modalCurrentVariant.price !== null) {
            return this.modalCurrentVariant.price;
          }
          return this.modalProduct ? Number(this.modalProduct.price) : 0;
        },

        addToCartFromModal() {
          if (this.modalCurrentVariant && !this.modalCurrentVariant.in_stock) return;
          var variantInfo = null;
          if (this.modalCurrentVariant) {
            variantInfo = {
              sku: this.modalCurrentVariant.sku,
              selections: Object.assign({}, this.modalSelected),
              price: this.modalDisplayPrice()
            };
          }
          Cart.addToCart(this.modalProduct.product_id, 1, variantInfo);
          window.dispatchEvent(new CustomEvent('cart-updated'));
          this.showModal = false;
          this.showToast('カートに追加しました');
        },

        showToast(msg) {
          this.toastMessage = msg;
          this.toast = true;
          setTimeout(() => { this.toast = false; }, 2000);
        }
      };
    }
  </script>
</body>
</html>
