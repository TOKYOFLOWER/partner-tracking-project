<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳細 - 花のアトリエ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
    [x-cloak] { display: none !important; }
    .gallery-track { display: flex; transition: transform 0.3s ease; }
    .gallery-track img { flex-shrink: 0; width: 100%; }
  </style>
</head>
<body class="bg-white text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-lg font-bold text-primary-700 tracking-wide">花のアトリエ</a>
      <a href="cart.html" class="relative inline-flex items-center text-gray-600 hover:text-primary-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121 0 2.09-.773 2.34-1.865l1.846-8.078A.75.75 0 0 0 22.106 3.5H6.372m1.128 10.75L6.106 5.272" />
        </svg>
        <span x-data="{ count: 0 }" x-init="
          count = Cart.getCartCount();
          window.addEventListener('cart-updated', () => { count = Cart.getCartCount(); });
        " x-show="count > 0" x-text="count"
          class="absolute -top-1.5 -right-2.5 bg-primary-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"></span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-6 pb-24 sm:pb-6" x-data="productPage()" x-init="init()" x-cloak>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20 text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="error" class="text-center py-20 text-red-500" x-text="error"></div>

    <!-- Product -->
    <div x-show="!loading && !error && product">

      <!-- Breadcrumb -->
      <nav class="text-sm text-gray-400 mb-4">
        <a href="index.html" class="hover:text-primary-600 transition">トップ</a>
        <span class="mx-1">></span>
        <span class="text-gray-600" x-text="product.name"></span>
      </nav>

      <!-- Gallery -->
      <div class="group relative bg-gray-50 overflow-hidden rounded-xl">
        <div class="aspect-square relative overflow-hidden"
             @touchstart.passive="touchStartX = $event.touches[0].clientX"
             @touchend="handleSwipe($event)"
             @mousedown.prevent="mouseStartX = $event.clientX; mouseDown = true"
             @mouseup="handleMouseSwipe($event)"
             @mouseleave="mouseDown = false">
          <!-- Loading -->
          <div x-show="gLoading" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-5">
            <div class="text-gray-300 text-sm">画像読み込み中...</div>
          </div>
          <!-- Slide track -->
          <div x-show="!gLoading" class="gallery-track h-full"
               :style="'transform: translateX(-' + (gCurrent * 100) + '%)'">
            <template x-for="(img, i) in gImages" :key="i">
              <img :src="img" :alt="product.name + ' 画像' + (i+1)"
                   class="w-full h-full object-contain"
                   @error="onImageError($event)">
            </template>
          </div>
          <!-- SOLD OUT -->
          <div x-show="!isVariantInStock()" class="absolute inset-0 bg-black/40 flex items-center justify-center z-10">
            <span class="bg-white text-gray-700 font-bold text-lg px-6 py-2 rounded">SOLD OUT</span>
          </div>
        </div>
        <!-- Counter -->
        <div x-show="gTotal > 1" class="absolute bottom-3 right-3 bg-black/50 text-white text-xs px-2.5 py-1 rounded-full z-10">
          <span x-text="(gCurrent + 1) + ' / ' + gTotal"></span>
        </div>
        <!-- Arrows (mobile: always visible, PC: hover) -->
        <button x-show="gCurrent > 0" @click="gPrev()"
          class="absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/90 hover:bg-white rounded-full flex items-center justify-center shadow-md transition z-10 sm:opacity-0 sm:group-hover:opacity-100">
          <svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <button x-show="gCurrent < gTotal - 1" @click="gNext()"
          class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/90 hover:bg-white rounded-full flex items-center justify-center shadow-md transition z-10 sm:opacity-0 sm:group-hover:opacity-100">
          <svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      <!-- Dots -->
      <div x-show="gTotal > 1" class="flex justify-center gap-1.5 py-3">
        <template x-for="i in gTotal" :key="'dot'+i">
          <button @click="gCurrent = i - 1"
            :class="gCurrent === (i - 1) ? 'bg-gray-800 w-2.5' : 'bg-gray-300 w-2'"
            class="h-2 rounded-full transition-all duration-200"></button>
        </template>
      </div>

      <!-- Product Info -->
      <div class="mt-5">
        <h1 class="text-2xl font-bold mb-3" x-text="product.name"></h1>

        <p class="text-xl font-bold text-primary-700 mb-4">
          <span x-text="'¥' + displayPrice().toLocaleString()"></span>
          <span class="text-sm font-normal text-gray-400">（税込）</span>
        </p>

        <p class="text-gray-600 whitespace-pre-line mb-6 leading-relaxed" x-text="product.description"></p>

        <!-- Variant Selection -->
        <div x-show="variants && variants.options && variants.options.length > 0" class="mb-6 space-y-5">
          <template x-for="(opt, optIdx) in (variants ? variants.options : [])" :key="opt.name">
            <div>
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-bold text-gray-700" x-text="opt.name"></span>
                <span class="text-sm text-primary-700 font-medium" x-text="selectedOptions[opt.name] || '未選択'"></span>
              </div>
              <div class="flex flex-wrap gap-2">
                <template x-for="val in opt.values" :key="val">
                  <button @click="selectedOptions[opt.name] = val; updateVariant()"
                    :class="selectedOptions[opt.name] === val
                      ? 'border-primary-600 bg-primary-50 text-primary-700 ring-1 ring-primary-600'
                      : 'border-gray-200 bg-white text-gray-700 hover:border-gray-400'"
                    class="px-4 py-2.5 border rounded-lg text-sm font-medium transition cursor-pointer min-w-[80px] text-center"
                    x-text="val"></button>
                </template>
              </div>
            </div>
          </template>
          <div x-show="currentVariant && !currentVariant.in_stock"
            class="p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600">
            この組み合わせは現在売り切れです
          </div>
        </div>

        <!-- Add to Cart (desktop) -->
        <div class="mb-8 hidden sm:block">
          <button x-show="isVariantInStock()" @click="addToCart()"
            class="w-full sm:w-auto bg-primary-600 hover:bg-primary-700 text-white font-medium px-8 py-3 rounded-lg transition active:scale-95 text-base">
            カートに入れる
          </button>
          <div x-show="!isVariantInStock()" class="text-gray-400 font-bold text-center py-3">現在売り切れです</div>
        </div>

        <!-- Additional Info -->
        <div class="border-t border-gray-100 pt-6">
          <h2 class="text-sm font-bold text-gray-700 mb-3">お届けについて</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
            <div class="flex gap-3 items-start bg-gray-50 rounded-lg p-3">
              <span class="text-primary-500 mt-0.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
              </span>
              <div>
                <p class="font-medium text-gray-700">送料</p>
                <p class="text-gray-500">¥10,000以上で送料無料（未満は¥550）</p>
              </div>
            </div>
            <div class="flex gap-3 items-start bg-gray-50 rounded-lg p-3">
              <span class="text-primary-500 mt-0.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 1 0 9.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1 1 14.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg>
              </span>
              <div>
                <p class="font-medium text-gray-700">ラッピング</p>
                <p class="text-gray-500">無料</p>
              </div>
            </div>
            <div class="flex gap-3 items-start bg-gray-50 rounded-lg p-3">
              <span class="text-primary-500 mt-0.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
              </span>
              <div>
                <p class="font-medium text-gray-700">メッセージカード</p>
                <p class="text-gray-500">無料</p>
              </div>
            </div>
            <div class="flex gap-3 items-start bg-gray-50 rounded-lg p-3">
              <span class="text-primary-500 mt-0.5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
              </span>
              <div>
                <p class="font-medium text-gray-700">お届け</p>
                <p class="text-gray-500">ご注文から3-5営業日</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast" x-transition.opacity.duration.300ms
      class="fixed bottom-20 sm:bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-lg shadow-lg text-sm z-50"
      x-text="toastMessage"></div>
  </main>

  <!-- Sticky Cart Button (mobile) -->
  <div x-data="{ show: false }" x-init="
    window.addEventListener('product-loaded', (e) => { show = e.detail.inStock; });
  " x-show="show" x-cloak
    class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 sm:hidden z-20">
    <button @click="document.dispatchEvent(new CustomEvent('do-add-to-cart'))"
      class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-lg transition active:scale-[0.98]">
      カートに入れる
    </button>
  </div>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-50">
    &copy; 2026 花のアトリエ
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/partner.js"></script>
  <script src="js/cart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function productPage() {
      return {
        product: null, loading: true, error: null, toast: false, toastMessage: '',
        // Variants
        variants: null, selectedOptions: {}, currentVariant: null, variantPrice: null,
        // Gallery state
        gCurrent: 0, gTotal: 0, gImages: [], gLoading: true,
        touchStartX: 0, mouseStartX: 0, mouseDown: false,

        async init() {
          Partner.initPartnerTracking();
          var params = new URLSearchParams(window.location.search);
          var id = params.get('id');
          if (!id) { this.error = '商品IDが指定されていません'; this.loading = false; return; }
          try {
            this.product = await API.fetchProduct(id);
            document.title = this.product.name + ' - 花のアトリエ';
            this.initGallery();
            // バリエーション読み込み
            try {
              this.variants = await API.fetchVariants(this.product.product_id);
              if (this.variants.options && this.variants.options.length > 0) {
                var self = this;
                this.variants.options.forEach(function(opt) {
                  self.selectedOptions[opt.name] = opt.values[0];
                });
                this.updateVariant();
              }
            } catch (e) { /* バリエーションなしの商品は無視 */ }
            window.dispatchEvent(new CustomEvent('product-loaded', { detail: { inStock: this.isVariantInStock() } }));
          } catch (e) { this.error = e.message; }
          finally { this.loading = false; }
          document.addEventListener('do-add-to-cart', () => { this.addToCart(); });
        },

        initGallery() {
          var urlText = this.product.images || '';
          var urls = urlText.split(/[\n\r]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });

          if (urls.length > 0) {
            this.gImages = urls;
            this.gTotal = urls.length;
          } else if (this.product.image) {
            this.gImages = [this.product.image];
            this.gTotal = 1;
          }
          this.gLoading = false;
        },

        gNext() { if (this.gCurrent < this.gTotal - 1) this.gCurrent++; },
        gPrev() { if (this.gCurrent > 0) this.gCurrent--; },

        // Touch swipe (mobile)
        handleSwipe(e) {
          var diff = this.touchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 40) { diff > 0 ? this.gNext() : this.gPrev(); }
        },
        // Mouse drag swipe (PC)
        handleMouseSwipe(e) {
          if (!this.mouseDown) return;
          this.mouseDown = false;
          var diff = this.mouseStartX - e.clientX;
          if (Math.abs(diff) > 40) { diff > 0 ? this.gNext() : this.gPrev(); }
        },
        onImageError(e) {
          if (!e.target.dataset.fallback) {
            e.target.dataset.fallback = '1';
            e.target.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800"><rect width="800" height="800" fill="#f3f4f6"/><text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#9ca3af">画像を読み込めません</text></svg>');
          }
        },

        isInStock() {
          if (!this.product) return false;
          var v = this.product.in_stock;
          return v === true || v === 'TRUE' || v === 'true' || v === 1 || v === '1';
        },

        updateVariant() {
          if (!this.variants || !this.variants.combinations) return;
          var self = this;
          this.currentVariant = this.variants.combinations.find(function(c) {
            return Object.keys(self.selectedOptions).every(function(key) {
              return c.selections[key] === self.selectedOptions[key];
            });
          }) || null;
          if (this.currentVariant && this.currentVariant.price !== null) {
            this.variantPrice = this.currentVariant.price;
          } else {
            this.variantPrice = null;
          }
        },

        displayPrice() {
          return this.variantPrice !== null ? this.variantPrice : Number(this.product.price);
        },

        isVariantInStock() {
          if (!this.variants || !this.variants.options || this.variants.options.length === 0) {
            return this.isInStock();
          }
          if (!this.currentVariant) return false;
          return this.currentVariant.in_stock;
        },

        addToCart() {
          var variantInfo = null;
          if (this.currentVariant) {
            variantInfo = {
              sku: this.currentVariant.sku,
              selections: Object.assign({}, this.selectedOptions),
              price: this.displayPrice()
            };
          }
          Cart.addToCart(this.product.product_id, 1, variantInfo);
          window.dispatchEvent(new CustomEvent('cart-updated'));
          this.showToast('カートに追加しました');
        },
        showToast(msg) {
          this.toastMessage = msg; this.toast = true;
          setTimeout(() => { this.toast = false; }, 2000);
        }
      };
    }
  </script>
</body>
</html>
