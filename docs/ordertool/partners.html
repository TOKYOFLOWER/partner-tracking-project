<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パートナー管理 - 注文管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Navigation -->
  <header class="bg-indigo-700 text-white">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <span class="text-lg font-bold tracking-wide">注文管理</span>
      <nav class="flex gap-1">
        <a href="index.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">注文一覧</a>
        <a href="aggregate.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">集計</a>
        <a href="partners.html"
          class="px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 text-white">パートナー</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6" x-data="partnerList()" x-init="init()">

    <!-- Filter -->
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <h1 class="text-lg font-bold mr-auto">パートナー管理</h1>
      <template x-for="s in ['all','pending','active','inactive']" :key="s">
        <button @click="statusFilter = s; filterPartners()"
          class="px-3 py-1 text-xs font-medium rounded-full border transition"
          :class="statusFilter === s ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-600 border-gray-300 hover:border-indigo-400'">
          <span x-text="statusLabels[s]"></span>
          <span class="ml-1" x-text="'(' + statusCounts[s] + ')'"></span>
        </button>
      </template>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20">
      <svg class="animate-spin h-8 w-8 text-indigo-500 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      <span class="text-gray-400 text-sm">読み込み中...</span>
    </div>

    <!-- Table -->
    <div x-show="!loading" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 uppercase">
              <th class="text-left px-4 py-3">ID</th>
              <th class="text-left px-4 py-3">氏名</th>
              <th class="text-left px-4 py-3">会社名</th>
              <th class="text-left px-4 py-3">メール</th>
              <th class="text-left px-4 py-3">電話</th>
              <th class="text-center px-4 py-3">ステータス</th>
              <th class="text-left px-4 py-3">登録日</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in filtered" :key="p.partner_id">
              <tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer transition" @click="openDetail(p.partner_id)">
                <td class="px-4 py-3 font-mono text-xs" x-text="p.partner_id"></td>
                <td class="px-4 py-3" x-text="p.partner_name"></td>
                <td class="px-4 py-3 text-gray-500" x-text="p.company_name || '-'"></td>
                <td class="px-4 py-3 text-gray-500 text-xs" x-text="p.email || '-'"></td>
                <td class="px-4 py-3 text-gray-500 text-xs" x-text="p.phone || '-'"></td>
                <td class="px-4 py-3 text-center">
                  <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium"
                    :class="statusClass(p.status)" x-text="statusLabels[p.status] || p.status"></span>
                </td>
                <td class="px-4 py-3 text-xs text-gray-500" x-text="formatDate(p.created_at)"></td>
              </tr>
            </template>
            <tr x-show="filtered.length === 0">
              <td colspan="7" class="px-4 py-10 text-center text-gray-400">パートナーがいません</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Detail Modal -->
    <div x-show="modal.open" x-transition.opacity
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
      @click.self="modal.open = false">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto" @click.stop>
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold">パートナー詳細</h3>
            <button @click="modal.open = false" class="text-gray-400 hover:text-gray-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>

          <template x-if="modal.partner">
            <div class="space-y-5">
              <!-- Basic -->
              <div>
                <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">基本情報</h4>
                <div class="text-sm space-y-1">
                  <div><span class="text-gray-500 inline-block w-24">パートナーID:</span> <span class="font-mono" x-text="modal.partner.partner_id"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">ステータス:</span>
                    <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium" :class="statusClass(modal.partner.status)" x-text="statusLabels[modal.partner.status]"></span>
                  </div>
                  <div><span class="text-gray-500 inline-block w-24">氏名:</span> <span x-text="modal.partner.partner_name"></span>
                    <span x-show="modal.partner.partner_name_kana" class="text-gray-400 text-xs ml-1" x-text="'(' + modal.partner.partner_name_kana + ')'"></span>
                  </div>
                  <div><span class="text-gray-500 inline-block w-24">会社名:</span> <span x-text="modal.partner.company_name || '-'"></span></div>
                </div>
              </div>

              <!-- Contact -->
              <div>
                <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">連絡先</h4>
                <div class="text-sm space-y-1">
                  <div><span class="text-gray-500 inline-block w-24">〒:</span> <span x-text="modal.partner.zip || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">住所:</span>
                    <span x-text="(modal.partner.prefecture || '') + (modal.partner.city || '') + (modal.partner.address1 || '')"></span>
                    <span x-show="modal.partner.address2" x-text="' ' + modal.partner.address2" class="text-gray-600"></span>
                  </div>
                  <div><span class="text-gray-500 inline-block w-24">電話:</span> <span x-text="modal.partner.phone || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">メール:</span> <span x-text="modal.partner.email || '-'"></span></div>
                </div>
              </div>

              <!-- Bank -->
              <div>
                <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">口座情報</h4>
                <div class="text-sm space-y-1">
                  <div><span class="text-gray-500 inline-block w-24">銀行名:</span> <span x-text="modal.partner.bank_name || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">支店名:</span> <span x-text="modal.partner.bank_branch || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">口座種別:</span> <span x-text="modal.partner.bank_account_type || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">口座番号:</span> <span class="font-mono" x-text="modal.partner.bank_account_number || '-'"></span></div>
                  <div><span class="text-gray-500 inline-block w-24">口座名義:</span> <span x-text="modal.partner.bank_account_holder || '-'"></span></div>
                </div>
              </div>

              <!-- Partner URL -->
              <div>
                <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">パートナーURL</h4>
                <div class="flex items-center gap-2">
                  <input type="text" readonly :value="'https://order.tokyoflower.jp/?id=' + modal.partner.partner_id"
                    class="flex-1 bg-gray-50 border border-gray-200 rounded px-3 py-1.5 text-xs font-mono">
                  <button @click="copyUrl()" class="px-3 py-1.5 text-xs font-medium bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200 transition">
                    <span x-text="copied ? 'コピー済み' : 'コピー'"></span>
                  </button>
                </div>
              </div>

              <!-- Actions -->
              <div class="flex gap-2 pt-2 border-t border-gray-100">
                <button x-show="modal.partner.status === 'pending'"
                  @click="changeStatus(modal.partner.partner_id, 'active')"
                  :disabled="modal.processing"
                  class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 transition disabled:opacity-50">承認</button>
                <button x-show="modal.partner.status === 'active'"
                  @click="changeStatus(modal.partner.partner_id, 'inactive')"
                  :disabled="modal.processing"
                  class="px-4 py-2 text-sm font-medium text-white bg-red-500 rounded-md hover:bg-red-600 transition disabled:opacity-50">無効化</button>
                <button x-show="modal.partner.status === 'inactive'"
                  @click="changeStatus(modal.partner.partner_id, 'active')"
                  :disabled="modal.processing"
                  class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 transition disabled:opacity-50">再有効化</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition.opacity.duration.300ms
      class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-lg shadow-lg text-sm text-white"
      :class="toast.type === 'error' ? 'bg-red-600' : 'bg-gray-800'"
      x-text="toast.message"></div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
    &copy; 2026 注文管理システム
  </footer>

  <!-- Scripts -->
  <script src="js/admin-config.js"></script>
  <script src="js/admin-api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function partnerList() {
      return {
        partners: [],
        filtered: [],
        loading: true,
        statusFilter: 'all',
        statusLabels: { all: 'すべて', pending: '申請中', active: '承認済み', inactive: '無効' },
        statusCounts: { all: 0, pending: 0, active: 0, inactive: 0 },
        modal: { open: false, partner: null, processing: false },
        toast: { show: false, message: '', type: 'success' },
        copied: false,

        async init() {
          await this.loadPartners();
        },

        async loadPartners() {
          this.loading = true;
          var res = await AdminAPI.fetchPartners();
          this.partners = Array.isArray(res) ? res : [];
          this.calcCounts();
          this.filterPartners();
          this.loading = false;
        },

        calcCounts() {
          this.statusCounts = { all: this.partners.length, pending: 0, active: 0, inactive: 0 };
          this.partners.forEach(function(p) {
            if (p.status === 'pending') this.statusCounts.pending++;
            else if (p.status === 'active') this.statusCounts.active++;
            else if (p.status === 'inactive') this.statusCounts.inactive++;
          }.bind(this));
        },

        filterPartners() {
          if (this.statusFilter === 'all') {
            this.filtered = this.partners;
          } else {
            var s = this.statusFilter;
            this.filtered = this.partners.filter(function(p) { return p.status === s; });
          }
        },

        statusClass(status) {
          if (status === 'pending') return 'bg-amber-100 text-amber-700';
          if (status === 'active') return 'bg-green-100 text-green-700';
          if (status === 'inactive') return 'bg-red-100 text-red-700';
          return 'bg-gray-100 text-gray-600';
        },

        formatDate(iso) {
          if (!iso) return '-';
          var d = new Date(iso);
          return d.getFullYear() + '/' +
                 String(d.getMonth() + 1).padStart(2, '0') + '/' +
                 String(d.getDate()).padStart(2, '0');
        },

        async openDetail(partnerId) {
          this.modal.partner = null;
          this.modal.open = true;
          this.modal.processing = false;
          this.copied = false;
          var res = await AdminAPI.fetchPartnerDetail(partnerId);
          if (res.error) {
            this.showToast(res.error, 'error');
            this.modal.open = false;
            return;
          }
          this.modal.partner = res;
        },

        async changeStatus(partnerId, newStatus) {
          this.modal.processing = true;
          var res = await AdminAPI.updatePartnerStatus(partnerId, newStatus);
          if (res.error) {
            this.showToast(res.error, 'error');
            this.modal.processing = false;
            return;
          }
          this.modal.partner = res;
          this.modal.processing = false;
          this.showToast('ステータスを更新しました');
          await this.loadPartners();
        },

        copyUrl() {
          if (!this.modal.partner) return;
          var url = 'https://order.tokyoflower.jp/?id=' + this.modal.partner.partner_id;
          navigator.clipboard.writeText(url);
          this.copied = true;
          setTimeout(() => { this.copied = false; }, 2000);
        },

        showToast(msg, type) {
          this.toast = { show: true, message: msg, type: type || 'success' };
          setTimeout(() => { this.toast.show = false; }, 2500);
        }
      };
    }
  </script>
</body>
</html>
