<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理 - 注文管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
    [x-cloak] { display: none !important; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #d1d5db; border-radius: 9999px; transition: 0.2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #22c55e; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Navigation -->
  <header class="bg-indigo-700 text-white">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <span class="text-lg font-bold tracking-wide">注文管理</span>
      <nav class="flex gap-1">
        <a href="index.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">注文一覧</a>
        <a href="aggregate.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">集計</a>
        <a href="partners.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">パートナー</a>
        <a href="products.html"
          class="px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 text-white">商品管理</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6" x-data="productManager()" x-init="init()" x-cloak>

    <!-- Header -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <h1 class="text-lg font-bold mr-auto">商品管理</h1>
      <!-- Category Filter -->
      <select x-model="categoryFilter" @change="filterProducts()"
        class="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">すべてのカテゴリ</option>
        <template x-for="c in categories" :key="c">
          <option :value="c" x-text="c"></option>
        </template>
      </select>
      <button @click="openCreateModal()"
        class="px-4 py-1.5 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 transition">
        + 新規商品を追加
      </button>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20">
      <svg class="animate-spin h-8 w-8 text-indigo-500 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      <span class="text-gray-400 text-sm">読み込み中...</span>
    </div>

    <!-- Error -->
    <div x-show="error" class="text-center py-20 text-red-500 text-sm" x-text="error"></div>

    <!-- Products Table -->
    <div x-show="!loading && !error" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 uppercase tracking-wider">
              <th class="text-left px-4 py-3">画像</th>
              <th class="text-left px-4 py-3">商品ID</th>
              <th class="text-left px-4 py-3">商品名</th>
              <th class="text-left px-4 py-3">カテゴリ</th>
              <th class="text-right px-4 py-3">価格</th>
              <th class="text-center px-4 py-3">在庫</th>
              <th class="text-center px-4 py-3">順序</th>
              <th class="text-left px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(p, idx) in filtered" :key="p.product_id">
              <tr :class="idx % 2 === 1 ? 'bg-gray-50' : 'bg-white'" class="border-b border-gray-100 hover:bg-indigo-50 transition">
                <td class="px-4 py-2">
                  <div class="w-12 h-12 rounded bg-gray-100 overflow-hidden flex items-center justify-center">
                    <img :src="p.image" :alt="p.name" class="w-full h-full object-cover"
                      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <span class="text-gray-300 text-xl" style="display:none;">&#128247;</span>
                  </div>
                </td>
                <td class="px-4 py-2 font-mono text-xs" x-text="p.product_id"></td>
                <td class="px-4 py-2 font-medium" x-text="p.name"></td>
                <td class="px-4 py-2 text-gray-500" x-text="p.category || '-'"></td>
                <td class="px-4 py-2 text-right" x-text="'¥' + Number(p.price).toLocaleString()"></td>
                <td class="px-4 py-2 text-center">
                  <label class="toggle-switch inline-block">
                    <input type="checkbox" :checked="p.in_stock" @change="toggleStock(p, $event)">
                    <span class="toggle-slider"></span>
                  </label>
                </td>
                <td class="px-4 py-2 text-center text-gray-500" x-text="p.sort_order || 0"></td>
                <td class="px-4 py-2">
                  <div class="flex gap-1.5">
                    <button @click="openEditModal(p)"
                      class="px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded text-xs font-medium hover:bg-indigo-200 transition">編集</button>
                    <button @click="confirmDelete(p)"
                      class="px-2.5 py-1 bg-red-100 text-red-700 rounded text-xs font-medium hover:bg-red-200 transition">削除</button>
                  </div>
                </td>
              </tr>
            </template>
            <tr x-show="filtered.length === 0 && !loading">
              <td colspan="8" class="px-4 py-10 text-center text-gray-400">商品がありません</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Product Modal (Create/Edit) -->
    <div x-show="modal.open" x-transition.opacity x-cloak
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
      @click.self="modal.open = false">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto" @click.stop>
        <div class="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
          <h3 class="text-lg font-bold" x-text="modal.isNew ? '新規商品を追加' : '商品を編集'"></h3>
          <button @click="modal.open = false" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-6 py-4 space-y-4">
          <!-- 楽天から取得セクション -->
          <div x-show="modal.isNew || !modal.form.product_id" class="p-4 bg-red-50 rounded-lg border border-red-200">
            <label class="block text-sm font-medium text-red-700 mb-2">楽天から商品情報を取得</label>
            <div class="flex gap-2">
              <input type="text" x-model="rakutenInput"
                placeholder="楽天の商品URLまたは商品管理番号を入力"
                class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
                @keydown.enter.prevent="fetchFromRakuten()">
              <button type="button" @click="fetchFromRakuten()"
                :disabled="rakutenLoading || !rakutenInput"
                class="px-4 py-2 bg-red-600 text-white text-sm rounded-md hover:bg-red-700 disabled:opacity-50 whitespace-nowrap transition">
                <span x-show="!rakutenLoading">取得</span>
                <span x-show="rakutenLoading">取得中...</span>
              </button>
            </div>
            <p x-show="rakutenError" x-text="rakutenError" class="mt-2 text-sm text-red-600"></p>
            <p x-show="rakutenSuccess" class="mt-2 text-sm text-green-600">商品情報を取得しました。内容を確認して保存してください。</p>
          </div>
          <!-- Name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">商品名 <span class="text-red-500">*</span></label>
            <input type="text" x-model="modal.form.name"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </div>
          <!-- Description -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">説明</label>
            <textarea x-model="modal.form.description" rows="3"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
          </div>
          <!-- Price -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">価格（税込） <span class="text-red-500">*</span></label>
            <input type="number" x-model.number="modal.form.price" min="1"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </div>
          <!-- Category -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">カテゴリ</label>
            <div class="flex gap-2">
              <input type="text" x-model="modal.form.category" placeholder="新しいカテゴリを入力"
                class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <select @change="if($event.target.value) { modal.form.category = $event.target.value; $event.target.value = ''; }"
                class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">既存から選択</option>
                <template x-for="c in categories" :key="c">
                  <option :value="c" x-text="c"></option>
                </template>
              </select>
            </div>
          </div>
          <!-- Image URL -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">画像URL</label>
            <div class="flex gap-3 items-start">
              <input type="text" x-model="modal.form.image" placeholder="https://..."
                class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <div class="w-16 h-16 rounded bg-gray-100 overflow-hidden flex-shrink-0 flex items-center justify-center"
                x-show="modal.form.image">
                <img :src="modal.form.image" class="w-full h-full object-cover"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  onload="this.style.display='block'; this.nextElementSibling.style.display='none';">
                <span class="text-xs text-gray-400 text-center px-1" style="display:none;">読込不可</span>
              </div>
            </div>
          </div>
          <!-- In Stock & Sort Order -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">在庫あり</label>
              <label class="toggle-switch inline-block mt-1">
                <input type="checkbox" x-model="modal.form.in_stock">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">表示順</label>
              <input type="number" x-model.number="modal.form.sort_order" min="0"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
          </div>

          <!-- Validation Error -->
          <div x-show="modal.error" class="p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-600" x-text="modal.error"></div>

          <!-- Variants Section (Edit mode only) -->
          <div x-show="!modal.isNew || modal.savedProductId" class="border-t border-gray-200 pt-4">
            <div class="flex items-center justify-between mb-3">
              <h4 class="text-sm font-bold text-gray-700">バリエーション</h4>
              <button @click="openVariantForm(null)"
                class="px-3 py-1 bg-green-100 text-green-700 text-xs font-medium rounded hover:bg-green-200 transition">
                + バリエーション追加
              </button>
            </div>

            <!-- Variant List -->
            <div x-show="variants.length > 0" class="space-y-2 mb-3">
              <template x-for="v in variants" :key="v.sku">
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
                  <div class="flex-1">
                    <span class="font-medium text-sm" x-text="v.option1_value || v.sku"></span>
                    <span class="text-gray-500 text-sm ml-2" x-text="'¥' + Number(v.price || 0).toLocaleString()"></span>
                    <span x-show="!(v.in_stock === true || v.in_stock === 'TRUE' || v.in_stock === 'true')"
                      class="ml-2 text-xs text-red-500 font-medium">在庫切れ</span>
                  </div>
                  <button @click="openVariantForm(v)"
                    class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded text-xs font-medium hover:bg-indigo-200 transition">編集</button>
                  <button @click="deleteVariant(v)"
                    class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-medium hover:bg-red-200 transition">削除</button>
                </div>
              </template>
            </div>
            <div x-show="variants.length === 0" class="text-sm text-gray-400 py-2">バリエーションはありません</div>

            <!-- Variant Form (inline) -->
            <div x-show="variantForm.open" x-transition class="p-4 bg-blue-50 rounded-lg border border-blue-200 space-y-3">
              <h5 class="text-sm font-bold text-gray-700" x-text="variantForm.isNew ? 'バリエーション追加' : 'バリエーション編集'"></h5>
              <div>
                <label class="block text-xs text-gray-500 mb-1">バリエーション名 <span class="text-red-500">*</span></label>
                <input type="text" x-model="variantForm.name" placeholder="例: ピンク 5本立て"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-gray-500 mb-1">価格 <span class="text-red-500">*</span></label>
                  <input type="number" x-model.number="variantForm.price" min="1"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                  <label class="block text-xs text-gray-500 mb-1">表示順</label>
                  <input type="number" x-model.number="variantForm.sort_order" min="0"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">説明</label>
                <input type="text" x-model="variantForm.description"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">画像URL</label>
                <input type="text" x-model="variantForm.image" placeholder="https://..."
                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              </div>
              <div>
                <label class="inline-flex items-center gap-2 text-sm">
                  <input type="checkbox" x-model="variantForm.in_stock" class="rounded border-gray-300">
                  <span>在庫あり</span>
                </label>
              </div>
              <div x-show="variantForm.error" class="text-sm text-red-500" x-text="variantForm.error"></div>
              <div class="flex gap-2">
                <button @click="saveVariant()"
                  :disabled="variantForm.processing"
                  class="px-4 py-2 text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 transition disabled:opacity-50">
                  <span x-show="!variantForm.processing">保存</span>
                  <span x-show="variantForm.processing">保存中...</span>
                </button>
                <button @click="variantForm.open = false"
                  class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 transition">キャンセル</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal Footer -->
        <div class="sticky bottom-0 bg-white border-t border-gray-100 px-6 py-4 flex justify-end gap-2">
          <button @click="modal.open = false"
            class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 transition">キャンセル</button>
          <button @click="saveProduct()"
            :disabled="modal.processing"
            class="px-4 py-2 text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 transition disabled:opacity-50">
            <span x-show="!modal.processing">保存</span>
            <span x-show="modal.processing">保存中...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation -->
    <div x-show="deleteModal.open" x-transition.opacity x-cloak
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
      @click.self="deleteModal.open = false">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 p-6" @click.stop>
        <h3 class="text-lg font-bold mb-3">商品を削除</h3>
        <p class="text-sm text-gray-600 mb-2">
          <span class="font-medium" x-text="deleteModal.productName"></span> を削除しますか？<br>この操作は取り消せません。
        </p>
        <p x-show="deleteModal.variantCount > 0"
          class="text-sm text-amber-600 bg-amber-50 border border-amber-200 rounded-md p-2 mb-4">
          この商品には<span class="font-bold" x-text="deleteModal.variantCount"></span>件のバリエーションがあります。すべて削除されます。
        </p>
        <div class="flex justify-end gap-2">
          <button @click="deleteModal.open = false"
            class="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 transition">キャンセル</button>
          <button @click="executeDelete()"
            :disabled="deleteModal.processing"
            class="px-4 py-2 text-sm text-white bg-red-600 rounded-md hover:bg-red-700 transition disabled:opacity-50">
            <span x-show="!deleteModal.processing">削除する</span>
            <span x-show="deleteModal.processing">削除中...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition.opacity.duration.300ms
      class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-lg shadow-lg text-sm text-white"
      :class="toast.type === 'error' ? 'bg-red-600' : 'bg-gray-800'"
      x-text="toast.message"></div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
    &copy; 2026 注文管理システム
  </footer>

  <!-- Scripts -->
  <script src="js/admin-config.js"></script>
  <script src="js/admin-api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function productManager() {
      return {
        products: [],
        filtered: [],
        categories: [],
        loading: true,
        error: null,
        categoryFilter: '',
        toast: { show: false, message: '', type: 'success' },

        // Product modal
        modal: {
          open: false,
          isNew: true,
          processing: false,
          error: '',
          savedProductId: null,
          form: { name: '', description: '', price: '', category: '', image: '', in_stock: true, sort_order: 0 }
        },

        // Variants
        variants: [],
        variantForm: {
          open: false, isNew: true, processing: false, error: '',
          variantId: '', name: '', price: '', description: '', image: '', in_stock: true, sort_order: 0
        },

        // Delete modal
        deleteModal: { open: false, productId: '', productName: '', variantCount: 0, processing: false },

        // Rakuten
        rakutenInput: '',
        rakutenLoading: false,
        rakutenError: '',
        rakutenSuccess: false,

        async init() {
          await this.loadProducts();
        },

        async loadProducts() {
          this.loading = true;
          this.error = null;
          var res = await AdminAPI.fetchAllProducts();
          if (res.error) {
            this.error = res.error;
            this.products = [];
          } else {
            this.products = Array.isArray(res) ? res : [];
          }
          // Load categories
          var catRes = await AdminAPI.fetchCategories();
          if (!catRes.error && catRes.categories) {
            this.categories = catRes.categories;
          }
          this.filterProducts();
          this.loading = false;
        },

        filterProducts() {
          if (!this.categoryFilter) {
            this.filtered = this.products;
          } else {
            var cat = this.categoryFilter;
            this.filtered = this.products.filter(function(p) { return p.category === cat; });
          }
        },

        openCreateModal() {
          this.modal = {
            open: true, isNew: true, processing: false, error: '', savedProductId: null,
            form: { name: '', description: '', price: '', category: '', image: '', in_stock: true, sort_order: 0 }
          };
          this.variants = [];
          this.variantForm.open = false;
          this.rakutenInput = '';
          this.rakutenError = '';
          this.rakutenSuccess = false;
        },

        async openEditModal(product) {
          this.modal = {
            open: true, isNew: false, processing: false, error: '', savedProductId: product.product_id,
            form: {
              product_id: product.product_id,
              name: product.name || '',
              description: product.description || '',
              price: Number(product.price) || '',
              category: product.category || '',
              image: product.image || '',
              in_stock: product.in_stock,
              sort_order: Number(product.sort_order) || 0
            }
          };
          this.variantForm.open = false;
          // Load variants
          await this.loadVariants(product.product_id);
        },

        async loadVariants(productId) {
          var res = await AdminAPI.fetchVariants(productId);
          if (!res.error && res.combinations) {
            // Store raw variant data for editing
            this.variants = res.combinations.map(function(c) {
              return {
                sku: c.sku,
                option1_value: c.selections ? Object.values(c.selections)[0] || '' : '',
                price: c.price,
                in_stock: c.in_stock
              };
            });
          } else {
            this.variants = [];
          }
        },

        async saveProduct() {
          // Validate
          if (!this.modal.form.name || !this.modal.form.name.trim()) {
            this.modal.error = '商品名を入力してください';
            return;
          }
          if (!this.modal.form.price || Number(this.modal.form.price) <= 0) {
            this.modal.error = '価格は正の数値で入力してください';
            return;
          }
          this.modal.error = '';
          this.modal.processing = true;

          var data = {
            name: this.modal.form.name.trim(),
            description: this.modal.form.description || '',
            price: Number(this.modal.form.price),
            tax_included: true,
            category: this.modal.form.category || '',
            image: this.modal.form.image || '',
            in_stock: this.modal.form.in_stock,
            sort_order: Number(this.modal.form.sort_order) || 0
          };

          var res;
          if (this.modal.isNew) {
            res = await AdminAPI.createProduct(data);
            if (res.error) {
              this.modal.error = res.error;
              this.modal.processing = false;
              return;
            }
            this.modal.isNew = false;
            this.modal.savedProductId = res.product_id;
            this.modal.form.product_id = res.product_id;
            this.showToast('商品を作成しました');
            try { localStorage.removeItem('tf_products_cache'); } catch(e) {}
          } else {
            data.product_id = this.modal.form.product_id;
            res = await AdminAPI.updateProduct(data);
            if (res.error) {
              this.modal.error = res.error;
              this.modal.processing = false;
              return;
            }
            this.showToast('商品を更新しました');
            try { localStorage.removeItem('tf_products_cache'); } catch(e) {}
          }

          this.modal.processing = false;
          await this.loadProducts();
        },

        async toggleStock(product, event) {
          var newVal = event.target.checked;
          var res = await AdminAPI.toggleProductStock(product.product_id, newVal);
          if (res.error) {
            event.target.checked = !newVal;
            this.showToast(res.error, 'error');
          } else {
            product.in_stock = newVal;
            this.showToast(newVal ? '在庫ありに変更しました' : '在庫切れに変更しました');
            try { localStorage.removeItem('tf_products_cache'); } catch(e) {}
          }
        },

        async confirmDelete(product) {
          // Check variant count
          var variantCount = 0;
          try {
            var res = await AdminAPI.fetchVariants(product.product_id);
            if (!res.error && res.combinations) {
              variantCount = res.combinations.length;
            }
          } catch (e) {}
          this.deleteModal = {
            open: true,
            productId: product.product_id,
            productName: product.name,
            variantCount: variantCount,
            processing: false
          };
        },

        async executeDelete() {
          this.deleteModal.processing = true;
          var res = await AdminAPI.deleteProduct(this.deleteModal.productId);
          if (res.error) {
            this.showToast(res.error, 'error');
            this.deleteModal.processing = false;
            return;
          }
          this.deleteModal.open = false;
          this.showToast('商品を削除しました');
          try { localStorage.removeItem('tf_products_cache'); } catch(e) {}
          await this.loadProducts();
        },

        // --- Variant methods ---
        openVariantForm(variant) {
          if (variant) {
            this.variantForm = {
              open: true, isNew: false, processing: false, error: '',
              variantId: variant.sku,
              name: variant.option1_value || '',
              price: Number(variant.price) || '',
              description: '',
              image: '',
              in_stock: variant.in_stock === true || variant.in_stock === 'TRUE' || variant.in_stock === 'true',
              sort_order: 0
            };
          } else {
            this.variantForm = {
              open: true, isNew: true, processing: false, error: '',
              variantId: '', name: '', price: '', description: '', image: '', in_stock: true, sort_order: 0
            };
          }
        },

        async saveVariant() {
          if (!this.variantForm.name || !this.variantForm.name.trim()) {
            this.variantForm.error = 'バリエーション名を入力してください';
            return;
          }
          if (!this.variantForm.price || Number(this.variantForm.price) <= 0) {
            this.variantForm.error = '価格は正の数値で入力してください';
            return;
          }
          this.variantForm.error = '';
          this.variantForm.processing = true;

          var productId = this.modal.form.product_id || this.modal.savedProductId;
          var res;
          if (this.variantForm.isNew) {
            res = await AdminAPI.createVariant({
              product_id: productId,
              variant_name: this.variantForm.name.trim(),
              variant_price: Number(this.variantForm.price),
              variant_description: this.variantForm.description || '',
              variant_image: this.variantForm.image || '',
              variant_in_stock: this.variantForm.in_stock,
              variant_sort_order: Number(this.variantForm.sort_order) || 0
            });
          } else {
            res = await AdminAPI.updateVariant({
              variant_id: this.variantForm.variantId,
              variant_name: this.variantForm.name.trim(),
              variant_price: Number(this.variantForm.price),
              variant_description: this.variantForm.description || '',
              variant_image: this.variantForm.image || '',
              variant_in_stock: this.variantForm.in_stock,
              variant_sort_order: Number(this.variantForm.sort_order) || 0
            });
          }

          this.variantForm.processing = false;
          if (res.error) {
            this.variantForm.error = res.error;
            return;
          }
          this.variantForm.open = false;
          this.showToast(this.variantForm.isNew ? 'バリエーションを追加しました' : 'バリエーションを更新しました');
          await this.loadVariants(productId);
        },

        async deleteVariant(variant) {
          if (!confirm(variant.option1_value + ' を削除しますか？')) return;
          var productId = this.modal.form.product_id || this.modal.savedProductId;
          var res = await AdminAPI.deleteVariant(variant.sku);
          if (res.error) {
            this.showToast(res.error, 'error');
            return;
          }
          this.showToast('バリエーションを削除しました');
          await this.loadVariants(productId);
        },

        async fetchFromRakuten() {
          if (!this.rakutenInput) return;
          this.rakutenLoading = true;
          this.rakutenError = '';
          this.rakutenSuccess = false;
          try {
            var result = await AdminAPI.fetchRakutenItem(this.rakutenInput.trim());
            if (result.success && result.item) {
              this.modal.form.name = result.item.name || '';
              this.modal.form.description = result.item.description || '';
              this.modal.form.price = result.item.price || '';
              if (result.item.image) {
                this.modal.form.image = result.item.image;
              }
              this.rakutenSuccess = true;
              if (result.item.raw) {
                console.log('楽天APIレスポンス:', result.item.raw);
              }
            } else {
              this.rakutenError = result.error || '商品情報を取得できませんでした';
            }
          } catch (e) {
            this.rakutenError = '通信エラーが発生しました: ' + e.message;
          } finally {
            this.rakutenLoading = false;
          }
        },

        showToast(msg, type) {
          this.toast = { show: true, message: msg, type: type || 'success' };
          setTimeout(() => { this.toast.show = false; }, 2500);
        }
      };
    }
  </script>
</body>
</html>
