<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集計 - 注文管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Navigation -->
  <header class="bg-indigo-700 text-white">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <span class="text-lg font-bold tracking-wide">注文管理</span>
      <nav class="flex gap-1">
        <a href="index.html"
          class="px-4 py-1.5 rounded text-sm font-medium text-indigo-200 hover:bg-indigo-600 hover:text-white transition">注文一覧</a>
        <a href="aggregate.html"
          class="px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 text-white">集計</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6" x-data="aggregatePage()" x-init="init()">

    <!-- Month Selector -->
    <div class="mb-5">
      <label class="block text-xs font-medium text-gray-500 mb-1">対象月</label>
      <input type="month" x-model="month" @change="fetchData()"
        class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20">
      <svg class="animate-spin h-8 w-8 text-indigo-500 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      <span class="text-gray-400 text-sm">読み込み中...</span>
    </div>

    <!-- Error -->
    <div x-show="error" class="text-center py-20 text-red-500 text-sm" x-text="error"></div>

    <div x-show="!loading && !error && data">

      <!-- Summary Cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
          <div class="text-xs text-gray-500 mb-1">総注文数</div>
          <div class="text-2xl font-bold text-gray-800" x-text="data.total_orders"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
          <div class="text-xs text-gray-500 mb-1">パートナー経由</div>
          <div class="text-2xl font-bold text-indigo-600" x-text="data.partner_orders"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
          <div class="text-xs text-gray-500 mb-1">確定売上</div>
          <div class="text-2xl font-bold text-green-600" x-text="'¥' + data.confirmed.amount.toLocaleString()"></div>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
          <div class="text-xs text-gray-500 mb-1">未確定</div>
          <div class="text-2xl font-bold text-amber-600" x-text="'¥' + data.pending.amount.toLocaleString()"></div>
        </div>
      </div>

      <!-- Partner Table -->
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-x-auto mb-6">
        <div class="px-5 py-3 border-b border-gray-200">
          <h2 class="text-sm font-bold text-gray-700">パートナー別集計</h2>
        </div>
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-xs font-medium text-gray-500 uppercase tracking-wider">
              <th class="text-left px-5 py-3">パートナー名</th>
              <th class="text-right px-4 py-3">件数</th>
              <th class="text-right px-4 py-3">確定金額</th>
              <th class="text-right px-4 py-3">未確定金額</th>
              <th class="text-right px-5 py-3">キャンセル金額</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(p, idx) in data.by_partner" :key="p.partner_id || '__direct__'">
              <tr :class="idx % 2 === 1 ? 'bg-gray-50' : 'bg-white'" class="border-b border-gray-100 hover:bg-indigo-50 transition">
                <td class="px-5 py-3 font-medium" x-text="p.partner_name"></td>
                <td class="px-4 py-3 text-right" x-text="p.total_count"></td>
                <td class="px-4 py-3 text-right text-green-700" x-text="'¥' + p.confirmed.amount.toLocaleString()"></td>
                <td class="px-4 py-3 text-right text-amber-700" x-text="'¥' + p.pending.amount.toLocaleString()"></td>
                <td class="px-5 py-3 text-right text-red-600" x-text="'¥' + p.cancelled.amount.toLocaleString()"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Monthly Chart -->
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <h2 class="text-sm font-bold text-gray-700 mb-4">月別推移</h2>
        <div x-show="monthlyData.length === 0" class="text-center py-10 text-gray-400 text-sm">データがありません</div>
        <div x-show="monthlyData.length > 0" class="flex items-end gap-2 h-48">
          <template x-for="m in monthlyData" :key="m.month">
            <div class="flex flex-col items-center flex-1">
              <span class="text-xs text-gray-600 mb-1" x-text="'¥' + m.amount.toLocaleString()"></span>
              <div class="w-full bg-indigo-500 rounded-t transition-all duration-300"
                   :style="'height: ' + (maxAmount > 0 ? (m.amount / maxAmount * 100) : 0) + '%'"></div>
              <span class="text-xs text-gray-500 mt-1" x-text="m.label"></span>
            </div>
          </template>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
    &copy; 2026 注文管理システム
  </footer>

  <!-- Scripts -->
  <script src="js/admin-config.js"></script>
  <script src="js/admin-api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function aggregatePage() {
      return {
        month: new Date().toISOString().slice(0, 7),
        data: null,
        monthlyData: [],
        maxAmount: 0,
        loading: true,
        error: null,

        async init() {
          await this.fetchData();
        },

        async fetchData() {
          this.loading = true;
          this.error = null;

          const [aggRes, monthlyRes] = await Promise.all([
            AdminAPI.fetchAggregate(this.month),
            AdminAPI.fetchMonthly()
          ]);

          if (aggRes.error) {
            this.error = aggRes.error;
            this.loading = false;
            return;
          }

          this.data = aggRes;

          // 月別推移（直近6ヶ月分）
          if (Array.isArray(monthlyRes)) {
            const recent = monthlyRes.slice(-6);
            this.monthlyData = recent.map(m => ({
              month: m.month,
              label: m.month.slice(5), // "MM" part
              amount: m.confirmed_sales || 0
            }));
            this.maxAmount = Math.max(...this.monthlyData.map(m => m.amount), 1);
          } else {
            this.monthlyData = [];
            this.maxAmount = 0;
          }

          this.loading = false;
        }
      };
    }
  </script>
</body>
</html>
