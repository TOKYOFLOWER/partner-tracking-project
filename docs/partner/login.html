<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パートナーログイン - 銀座東京フラワー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#fdf2f2', 100: '#fce4e4', 200: '#f9c5c5', 400: '#d4292c', 500: '#a50407', 600: '#8a0306', 700: '#6e0205' },
            partner: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="../js/config.js"></script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-between">
      <a href="../index.html" class="text-lg font-bold text-primary-700 tracking-wide">銀座東京フラワー</a>
      <span class="text-xs font-medium text-partner-600 bg-partner-50 px-2 py-0.5 rounded-full">パートナー専用</span>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-10" x-data="partnerLogin()">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-partner-100 mb-3">
            <svg class="w-7 h-7 text-partner-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <h1 class="text-xl font-bold text-gray-800">パートナーログイン</h1>
          <p class="text-sm text-gray-400 mt-1">成果確認・マイページ</p>
        </div>

        <!-- Error -->
        <div x-show="errorMsg" x-cloak class="mb-5 bg-red-50 border border-red-200 rounded-lg p-3">
          <p class="text-red-600 text-sm" x-text="errorMsg"></p>
        </div>

        <form @submit.prevent="login()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm text-gray-600 mb-1">パートナーID</label>
              <input type="text" x-model="partnerId" placeholder="ptn0001"
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-partner-400">
            </div>
            <div>
              <label class="block text-sm text-gray-600 mb-1">メールアドレス</label>
              <input type="email" x-model="email" placeholder="example@mail.com"
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-partner-400">
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" x-model="remember" id="remember" class="rounded border-gray-300 text-partner-600 focus:ring-partner-400">
              <label for="remember" class="text-sm text-gray-500">ログイン情報を記憶する</label>
            </div>
          </div>
          <button type="submit" :disabled="loading"
            class="w-full mt-6 bg-partner-600 hover:bg-partner-700 disabled:opacity-50 text-white font-medium px-6 py-2.5 rounded-lg transition">
            <span x-show="!loading">ログイン</span>
            <span x-show="loading">認証中...</span>
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-gray-400 mt-6">
        パートナー未登録の方は<a href="../partner-register.html" class="text-partner-600 hover:underline">新規登録はこちら</a>
      </p>
    </div>
  </main>

  <script>
    function partnerLogin() {
      return {
        partnerId: '',
        email: '',
        remember: false,
        loading: false,
        errorMsg: '',

        init() {
          // Already logged in? Redirect
          var session = localStorage.getItem('partner_session') || sessionStorage.getItem('partner_session');
          if (session) {
            window.location.href = 'index.html';
          }
        },

        async login() {
          this.errorMsg = '';
          if (!this.partnerId || !this.email) {
            this.errorMsg = 'パートナーIDとメールアドレスを入力してください';
            return;
          }
          this.loading = true;
          try {
            var res = await fetch(CONFIG.API_BASE, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain' },
              body: JSON.stringify({ action: 'partner_login', partner_id: this.partnerId, email: this.email })
            });
            var data = await res.json();
            if (data.error) {
              this.errorMsg = data.error;
              this.loading = false;
              return;
            }
            var sessionData = JSON.stringify({
              partner_id: data.partner.partner_id,
              email: data.partner.email,
              partner_name: data.partner.partner_name,
              logged_at: new Date().toISOString()
            });
            if (this.remember) {
              localStorage.setItem('partner_session', sessionData);
            } else {
              sessionStorage.setItem('partner_session', sessionData);
            }
            window.location.href = 'index.html';
          } catch (e) {
            this.errorMsg = '通信エラーが発生しました。しばらくしてからお試しください。';
          }
          this.loading = false;
        }
      };
    }
  </script>
</body>
</html>
