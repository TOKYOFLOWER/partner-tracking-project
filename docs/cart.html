<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カート - 銀座東京フラワー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#fdf2f2', 100: '#fce4e4', 200: '#f9c5c5', 400: '#d4292c', 500: '#a50407', 600: '#8a0306', 700: '#6e0205' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Meiryo", sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-white text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="text-lg font-bold text-primary-700 tracking-wide">銀座東京フラワー</a>
      <a href="cart.html" class="relative inline-flex items-center text-gray-600 hover:text-primary-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121 0 2.09-.773 2.34-1.865l1.846-8.078A.75.75 0 0 0 22.106 3.5H6.372m1.128 10.75L6.106 5.272" />
        </svg>
        <span x-data="{ count: 0 }" x-init="
          count = Cart.getCartCount();
          window.addEventListener('cart-updated', () => { count = Cart.getCartCount(); });
        " x-show="count > 0" x-text="count"
          class="absolute -top-1.5 -right-2.5 bg-primary-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"></span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-6" x-data="cartPage()" x-init="init()" x-cloak>

    <h1 class="text-xl font-bold mb-6">ショッピングカート</h1>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-20 text-gray-400">読み込み中...</div>

    <!-- Empty Cart -->
    <div x-show="!loading && items.length === 0" class="text-center py-20">
      <p class="text-gray-400 mb-4">カートに商品がありません</p>
      <a href="index.html" class="inline-block bg-primary-600 hover:bg-primary-700 text-white font-medium px-6 py-2.5 rounded-lg transition">商品一覧へ</a>
    </div>

    <!-- Cart Items -->
    <div x-show="!loading && items.length > 0">
      <div class="space-y-4 mb-6">
        <template x-for="(item, idx) in items" :key="item.sku">
          <div class="bg-white border border-gray-100 rounded-xl p-4">
            <div class="flex gap-4">
              <!-- Thumbnail -->
              <a :href="'product.html?id=' + item.product_id" class="flex-shrink-0">
                <img :src="item.image" :alt="item.name" class="w-20 h-20 object-cover rounded-lg bg-gray-50"
                     onerror="this.style.display='none'">
              </a>
              <!-- Info -->
              <div class="flex-1 min-w-0">
                <a :href="'product.html?id=' + item.product_id" class="font-bold text-sm text-gray-800 hover:text-primary-600 transition line-clamp-2" x-text="item.name"></a>
                <p x-show="item.selections" class="text-xs text-gray-500 mt-0.5" x-text="formatSelections(item.selections)"></p>
                <p class="text-sm font-medium text-gray-700 mt-1" x-text="'¥' + item.price.toLocaleString()"></p>
              </div>
            </div>
            <!-- Qty & Total & Delete -->
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-50">
              <div class="flex items-center gap-3">
                <button @click="updateQty(idx, -1)" :disabled="item.qty <= 1"
                  :class="item.qty <= 1 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-gray-200'"
                  class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 transition text-lg font-bold">&minus;</button>
                <span class="text-sm font-bold w-6 text-center" x-text="item.qty"></span>
                <button @click="updateQty(idx, 1)"
                  class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 transition text-lg font-bold">&plus;</button>
              </div>
              <div class="flex items-center gap-4">
                <span class="text-sm font-bold text-gray-800" x-text="'¥' + item.lineTotal.toLocaleString()"></span>
                <button @click="removeItem(idx)" class="text-xs text-gray-400 hover:text-red-500 transition">削除</button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Summary -->
      <div class="bg-gray-50 rounded-xl p-5 space-y-2 text-sm mb-6">
        <div class="flex justify-between">
          <span class="text-gray-500">小計</span>
          <span class="font-medium" x-text="'¥' + totals.subtotal.toLocaleString()"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">送料</span>
          <span class="font-medium" x-text="totals.shipping === 0 ? '無料' : '¥' + totals.shipping.toLocaleString()"></span>
        </div>
        <div x-show="totals.subtotal > 0 && totals.subtotal < 10000" class="text-xs text-primary-600">
          あと<span x-text="'¥' + (10000 - totals.subtotal).toLocaleString()"></span>で送料無料
        </div>
        <div class="flex justify-between pt-2 border-t border-gray-200 text-base">
          <span class="font-bold">合計</span>
          <span class="font-bold text-primary-700" x-text="'¥' + totals.total.toLocaleString()"></span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-3">
        <a href="index.html" class="text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium px-6 py-3 rounded-lg transition sm:flex-1">買い物を続ける</a>
        <a href="order.html" class="text-center bg-primary-600 hover:bg-primary-700 text-white font-medium px-6 py-3 rounded-lg transition sm:flex-1">注文手続きへ</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-50">
    &copy; 2026 銀座東京フラワー
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/partner.js"></script>
  <script src="js/cart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    function cartPage() {
      return {
        items: [],
        loading: true,
        totals: { subtotal: 0, shipping: 0, total: 0 },

        async init() {
          var cartItems = Cart.getCartItems();
          if (cartItems.length === 0) {
            this.loading = false;
            return;
          }

          var productIds = [];
          cartItems.forEach(function(c) {
            if (productIds.indexOf(c.product_id) < 0) productIds.push(c.product_id);
          });
          var products = {};
          for (var i = 0; i < productIds.length; i++) {
            try {
              products[productIds[i]] = await API.fetchProduct(productIds[i]);
            } catch (e) {}
          }

          this.items = cartItems.map(function(cartItem) {
            var p = products[cartItem.product_id] || {};
            var price = cartItem.variant_price || Number(p.price) || 0;
            var thumb = p.image || '';
            if (p.images && String(p.images).trim()) {
              thumb = String(p.images).split(/[\n\r]+/)[0].trim();
            }
            return {
              product_id: cartItem.product_id,
              sku: cartItem.sku || cartItem.product_id,
              name: p.name || cartItem.product_id,
              image: thumb,
              price: price,
              qty: cartItem.qty,
              selections: cartItem.selections || null,
              lineTotal: price * cartItem.qty
            };
          });

          this.recalc();
          this.loading = false;
        },

        recalc() {
          var subtotal = this.items.reduce(function(s, item) { return s + item.lineTotal; }, 0);
          var shipping = subtotal >= 10000 ? 0 : 550;
          this.totals = { subtotal: subtotal, shipping: shipping, total: subtotal + shipping };
        },

        updateQty(index, delta) {
          var item = this.items[index];
          var newQty = item.qty + delta;
          if (newQty < 1) return;
          item.qty = newQty;
          item.lineTotal = item.price * newQty;
          var cartItems = Cart.getCartItems();
          var key = item.sku;
          var found = cartItems.find(function(c) { return (c.sku || c.product_id) === key; });
          if (found) found.qty = newQty;
          Cart.saveCartItems(cartItems);
          this.recalc();
          window.dispatchEvent(new CustomEvent('cart-updated'));
        },

        removeItem(index) {
          var item = this.items[index];
          var key = item.sku;
          var cartItems = Cart.getCartItems().filter(function(c) { return (c.sku || c.product_id) !== key; });
          Cart.saveCartItems(cartItems);
          this.items.splice(index, 1);
          this.recalc();
          window.dispatchEvent(new CustomEvent('cart-updated'));
        },

        formatSelections(selections) {
          if (!selections) return '';
          return Object.keys(selections).map(function(k) { return k + ': ' + selections[k]; }).join(' / ');
        }
      };
    }
  </script>
</body>
</html>
